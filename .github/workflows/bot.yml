name: energy-bot
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC; GitHub may delay a few minutes)
  workflow_dispatch: {}       # manual "Run workflow" button for testing

permissions:
  contents: write

concurrency:
  group: energy-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run bot
        env:
          AMBER_TOKEN: ${{ secrets.AMBER_TOKEN }}
          FOX_KEY: ${{ secrets.FOX_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python bot.py
      - name: Commit dashboard data
        run: |
          git config user.name "energy-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json state.json
          git diff --cached --quiet || git commit -m "data update"
          git pull --rebase
          git push
