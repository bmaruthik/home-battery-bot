<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Energy</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, sans-serif; background:#111; color:#eee; margin:0; padding:12px; }
  h1 { font-size:1.1rem; margin:4px 0 12px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(105px,1fr)); gap:8px; margin-bottom:14px; }
  .card { background:#1c1c1e; border-radius:10px; padding:10px; text-align:center; }
  .card .v { font-size:1.3rem; font-weight:700; }
  .card .l { font-size:.7rem; opacity:.6; text-transform:uppercase; letter-spacing:.05em; }
  .chartbox { background:#1c1c1e; border-radius:10px; padding:10px; margin-bottom:14px; }
  #updated { font-size:.75rem; opacity:.5; }
  .green{color:#4cd964}.red{color:#ff453a}.amber{color:#ffd60a}.blue{color:#64b5f6}
</style>
</head>
<body>
<h1>⚡ Home Energy <span id="updated"></span></h1>
<div class="cards">
  <div class="card"><div class="v amber" id="c-price">–</div><div class="l">c/kWh now</div></div>
  <div class="card"><div class="v green" id="c-soc">–</div><div class="l">Battery</div></div>
  <div class="card"><div class="v blue" id="c-load">–</div><div class="l">Load kW</div></div>
  <div class="card"><div class="v" id="c-solar">–</div><div class="l">Solar kW</div></div>
  <div class="card"><div class="v" id="c-gen">–</div><div class="l">Backup kW</div></div>
  <div class="card"><div class="v red" id="c-grid">–</div><div class="l">Grid kW</div></div>
</div>
<div class="chartbox"><canvas id="main" height="220"></canvas></div>
<div class="chartbox"><canvas id="fc" height="160"></canvas></div>
<script>
async function go(){
  const d = await (await fetch('data.json?t='+Date.now())).json();
  const h = d.history || [];
  const last = h[h.length-1] || {};
  document.getElementById('updated').textContent = 'updated ' + (d.updated||'');
  const fmt=(x,dp=1)=> (x==null?'–':Number(x).toFixed(dp));
  document.getElementById('c-price').textContent = fmt(last.price,0);
  document.getElementById('c-soc').textContent = fmt(last.soc,0)+'%';
  document.getElementById('c-load').textContent = fmt(last.load);
  document.getElementById('c-solar').textContent = fmt(last.solar);
  document.getElementById('c-gen').textContent = fmt(last.gen);
  document.getElementById('c-grid').textContent = fmt(last.grid);  

  const labels = h.map(p=>p.t.slice(5));
  new Chart(document.getElementById('main'),{
    type:'line',
    data:{labels,datasets:[
      {label:'Price c/kWh',data:h.map(p=>p.price),borderColor:'#ffd60a',yAxisID:'y',pointRadius:0,borderWidth:2},
      {label:'Battery %',data:h.map(p=>p.soc),borderColor:'#4cd964',yAxisID:'y1',pointRadius:0,borderWidth:2},
      {label:'Load kW',data:h.map(p=>p.load),borderColor:'#64b5f6',yAxisID:'y2',pointRadius:0,borderWidth:1},
      {label:'Solar kW',data:h.map(p=>p.solar),borderColor:'#ff9f0a',yAxisID:'y2',pointRadius:0,borderWidth:1},
      {label:'Grid kW',data:h.map(p=>p.grid),borderColor:'#ff453a',yAxisID:'y2',pointRadius:0,borderWidth:1},
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      scales:{y:{position:'left',title:{display:true,text:'c/kWh'}},
              y1:{position:'right',min:0,max:100,grid:{drawOnChartArea:false},title:{display:true,text:'%'}},
              y2:{display:false}},
      plugins:{legend:{labels:{boxWidth:12,font:{size:10}}}}}
  });
  new Chart(document.getElementById('fc'),{
    type:'bar',
    data:{labels:(d.forecast||[]).map(f=>f.t),
      datasets:[{label:'Forecast price c/kWh',data:(d.forecast||[]).map(f=>f.price),
        backgroundColor:(d.forecast||[]).map(f=>f.price>=40?'#ff453a':f.price<=8?'#4cd964':'#ffd60a')}]},
    options:{plugins:{legend:{display:false},title:{display:true,text:'Next 12h forecast'}}}
  });
}
go();
</script>
</body>
</html>
